      properties:
        customer_id:
          description: Customer ID (optional for guest orders)
          format: uuid
          type: string
        currency:
          default: usd
          description: Three-letter ISO currency code
          maxLength: 3
          minLength: 3
          type: string
        billing_type:
          default: one_time
          description: "Billing type. one_time: Single purchase. recurring: Subscription-based."
          enum:
          - one_time
          - recurring
          type: string
        line_items:
          description: Order line items (at least one required)
          items:
            $ref: "#/components/schemas/CreateOrderRequest_line_items_inner"
          minItems: 1
          type: array
        metadata:
          additionalProperties: true
          description: Custom key-value metadata
          type: object
        notes:
          maxLength: 1000
          type: string
        expires_at:
          description: Expiration timestamp for the order
          format: date-time
          type: string
        invoice_id:
          description: ID of the linked invoice (Commercial Truth)
          format: uuid
          type: string
        subscription_id:
          description: ID of the linked subscription (for recurring fulfillment)
          format: uuid
          type: string
      required:
      - line_items
    UpdateOrderRequest:
      description: Parameters for updating order metadata or notes before fulfillment.
      properties:
        customer_id:
          format: uuid
          nullable: true
