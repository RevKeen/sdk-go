- description: |
    Receive real-time event notifications. Configure endpoints for payment events, invoice updates, and more.

    ## Signature Verification

    All webhooks include a signature in the `X-Revkeen-Signature` header for verification:

    ```
    X-Revkeen-Signature: t=1705689600,v1=abc123...
    ```

    **Node.js Example:**
    ```javascript
    const crypto = require('crypto');

    function verifyWebhook(payload, signature, secret) {
      const [timestamp, hash] = signature.split(',').map(s => s.split('=')[1]);
      const expectedHash = crypto
        .createHmac('sha256', secret)
        .update(`${timestamp}.${payload}`)
        .digest('hex');
      return crypto.timingSafeEqual(Buffer.from(hash), Buffer.from(expectedHash));
    }
    ```

    ## Event Types

    Events use dot notation: `{resource}.{action}`
    - `payment.succeeded`, `payment.failed`
    - `invoice.created`, `invoice.paid`, `invoice.overdue`
    - `subscription.created`, `subscription.canceled`, `subscription.renewed`
    - `customer.created`, `customer.updated`
    - `checkout.session.completed`, `checkout.session.expired`
    - `usage.threshold.reached`, `usage.period_finalized`, `usage.event.rejected`

    Use wildcards in endpoint configuration: `invoice.*` or `*` for all events.
