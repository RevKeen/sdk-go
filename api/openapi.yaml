    \ duration, and retry schedule. Use these to debug a specific failed delivery\
    \ (for example, a 503 from a staging endpoint) and to queue an immediate retry.\
    \ This is the grain Stripe and Polar expose for webhook debugging — use `/v2/events/:id/resend`\
    \ when you want to re-dispatch the event across **all** endpoints instead."
  name: Webhook Deliveries
  x-displayName: Webhook Deliveries
- description: |-
    A programmatic customer-portal surface. Mint a short-lived bearer token via `POST /v2/customer-portal/sessions` for a specific customer, then hand that token to the customer's browser or to an app acting on their behalf. Subsequent `/v2/customer-portal/*` calls authenticate as that customer — returning only that customer's own subscriptions and invoices, and letting them self-cancel a subscription.

    This is distinct from the hosted customer portal (cookie-based, rendered by RevKeen). Use the hosted portal when you want a drop-in self-service page; use the programmatic surface here when you're embedding self-service inside your own app with your own UI.

    Tokens are Polar-shaped: prefix `rkcps_`, 60-minute default TTL, no server-side revocation list in v1 (short TTL and re-mint are the revocation story).
  name: Customer Portal
  x-displayName: Customer Portal
- description: |-
    Per-customer usage aggregates, computed live from `usage_events`. Given a customer, return the total consumption per meter the merchant has defined. Use this to power "current usage" UI inside embedded portals — Polar exposes the same primitive and it's the shape billing-savvy agents expect.

    RevKeen does not maintain a separate `customer_meters` table. Aggregates are derived on demand from `usage_events` grouped by `(customer_id, meter_id)`. This keeps the write path cheap and always up-to-date; there is no batch to fall behind.

    The path uses a composite ID `(customer_id, meter_id)` rather than a synthetic single-segment ID because both components are first-class entities the caller already holds.
  name: Customer Meters
  x-displayName: Customer Meters
