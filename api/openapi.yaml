    TerminalDevice:
      description: "A POS terminal device registered to your merchant account, with\
        \ connection status and capabilities."
      properties:
        id:
          description: Unique identifier for this terminal device. Use this as the
            device_id when initiating payments.
          format: uuid
          type: string
        device_name:
          description: "Friendly name assigned to this device (e.g., 'Front Desk Terminal')"
          nullable: true
          type: string
        terminal_serial:
          description: Serial number of the paired PAX terminal hardware
          nullable: true
          type: string
        terminal_ip:
          description: The LAN IP address of the terminal as seen by the connector
            on the merchant's local network. This is not a publicly reachable address
            — all commands flow through the RevKeen cloud.
          nullable: true
          type: string
        platform:
          description: Operating system of the machine running the Terminal Connector
            application
          enum:
          - macos
          - windows
          - linux
          - null
          nullable: true
          type: string
        status:
          description: "Device connectivity status. online: connector connected and\
            \ heartbeat within 5 minutes. offline: heartbeat stale or connector disconnected.\
            \ pairing: connector registered but terminal not yet paired."
          enum:
          - online
          - offline
          - pairing
          type: string
        terminal_paired:
          description: Whether a PAX terminal has been paired to this connector device.
            Must be true to accept payments.
          type: boolean
        terminal_reachable:
          description: Whether the connector can currently reach the PAX terminal
            on the local network
          nullable: true
          type: boolean
        app_version:
          description: Version of the Terminal Connector application
          nullable: true
          type: string
        last_heartbeat_at:
          description: ISO 8601 timestamp of the last heartbeat received from this
            device. Devices with no heartbeat in 5 minutes are considered offline.
          nullable: true
          type: string
      required:
