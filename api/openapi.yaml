          type: string
        failure_reason:
          nullable: true
          type: string
        failure_code:
          nullable: true
          type: string
        voided_at:
          example: 2024-01-15T10:30:00Z
          nullable: true
          type: string
        created_at:
          example: 2024-01-14T08:00:00Z
          type: string
      required:
      - amount_minor
      - created_at
      - currency
      - failure_code
      - failure_reason
      - gateway
      - gateway_void_id
      - id
      - order_id
      - parent_transaction_id
      - payment_id
      - public_id
      - reason
      - reason_code
      - status
      - voided_at
    VoidRetrieveResponse:
      description: A single void object with full details.
      properties:
        data:
          $ref: "#/components/schemas/Void"
