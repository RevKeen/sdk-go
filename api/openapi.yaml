    Event:
      description: "An event represents something that happened in your account —\
        \ a payment succeeded, an invoice was created, a subscription changed. Events\
        \ are the source of truth for webhook delivery."
      example:
        request:
          idempotency_key: idempotency_key
          id: id
        data:
          previous_attributes: ""
          object: ""
        livemode: true
        created: 1704067200
        id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        type: invoice.paid
        api_version: 2026-01-15
        pending_webhooks: 0
        object: event
      properties:
        id:
          description: Unique event identifier
          format: uuid
          type: string
        object:
          description: Object type
          enum:
          - event
          type: string
        type:
          description: "Event type (e.g., invoice.paid, payment.succeeded)"
          example: invoice.paid
          type: string
        data:
          $ref: "#/components/schemas/Event_data"
        request:
          $ref: "#/components/schemas/EventRequest"
        pending_webhooks:
          description: Number of webhooks still pending delivery for this event
          example: 0
          type: integer
        api_version:
          description: API version used to render this event
          example: 2026-01-15
          nullable: true
          type: string
        livemode:
          description: Whether this event was produced in live mode
          example: true
          type: boolean
        created:
          description: Unix timestamp when the event was created
          example: 1704067200
          type: integer
