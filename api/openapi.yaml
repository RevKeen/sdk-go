          - send_invoice
          type: string
        coupon:
          description: Coupon code to apply during this phase
          nullable: true
          type: string
        trial_end:
          description: End of trial period (if applicable)
          nullable: true
          type: string
        metadata:
          additionalProperties: true
          description: Phase-specific metadata
          type: object
      required:
      - items
      - start_date
    PhaseItem:
      description: "A product-price pair within a schedule phase, defining what the\
