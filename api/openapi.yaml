        start_date:
          description: When this phase starts (ISO 8601 date)
          example: 2026-03-01T00:00:00Z
          type: string
        end_date:
          description: When this phase ends (null for indefinite)
          example: 2026-06-01T00:00:00Z
          nullable: true
          type: string
        proration_behavior:
          description: How to handle prorations when entering this phase
