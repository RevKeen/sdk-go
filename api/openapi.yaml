      description: The newly created discount object.
      properties:
        data:
          $ref: "#/components/schemas/Discount"
      required:
      - data
    CreateDiscountInput:
      description: "Parameters for creating a new discount code with amount, type,\
        \ and usage limits."
      properties:
        code:
          description: Unique discount code (will be uppercased)
          example: SUMMER20
          maxLength: 50
          minLength: 1
          type: string
        name:
          description: Human-readable name
          example: Summer Sale 20% Off
          maxLength: 255
          minLength: 1
          type: string
        description:
          description: Optional description
          example: 20% off for summer promotion
          maxLength: 1000
          type: string
        discount_type:
          description: Type of discount
          enum:
          - percentage
          - fixed_amount
          example: percentage
          type: string
        discount_value:
          description: Discount value - percentage (1-100) or amount in cents
          example: 20
          minimum: 0.01
          type: number
        applies_to:
          default: all
          description: Which products the discount applies to
          enum:
          - all
          - specific_products
          example: all
          type: string
        scope:
          description: Scope of where discount can be applied
          enum:
          - entire_order
          - specific_products
          - subscription_only
          - one_time_only
          example: entire_order
          type: string
        product_ids:
          description: Product IDs if applies_to is 'specific_products'
          items:
            type: string
          type: array
        max_redemptions:
          description: Maximum total redemptions allowed
          example: 100
          minimum: 1
          type: integer
        max_redemptions_per_user:
          default: 0
          description: Maximum redemptions per customer (0 = unlimited)
          example: 1
          minimum: 0
          type: integer
        valid_from:
          description: Start date (ISO 8601)
          example: 2024-06-01T00:00:00Z
          type: string
        valid_until:
          description: End date (ISO 8601)
          example: 2024-08-31T23:59:59Z
          type: string
        recurring_type:
          description: How the discount applies to recurring payments
          enum:
          - once
          - forever
          - repeating
          example: once
          type: string
        recurring_cycles:
          description: Number of billing cycles (only if recurring_type is 'repeating')
          example: 3
          minimum: 1
          type: integer
        first_time_customer:
          default: false
          description: Only available to first-time customers
          example: false
          type: boolean
      required:
      - code
      - discount_type
      - discount_value
      - name
