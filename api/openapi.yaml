          description: Amount captured in cents (for auth-capture flow)
          nullable: true
          type: integer
        amount_refunded:
          default: 0
          description: Amount refunded in cents
          type: integer
        gateway:
          description: Name of the payment processor that handled this payment
          nullable: true
          type: string
        gateway_transaction_id:
          description: Processor's transaction reference
          nullable: true
          type: string
        gateway_response_code:
          description: Normalized response code from the processor
          nullable: true
          type: string
        gateway_response_text:
          description: Human-readable response message from the processor
          nullable: true
          type: string
        payment_method_type:
          description: "Payment method type (card, ach, wallet)"
          nullable: true
          type: string
        card_brand:
          description: "Card brand (visa, mastercard, etc.)"
          nullable: true
          type: string
        card_last_four:
          description: Last 4 digits of card
          nullable: true
          type: string
        payment_channel:
          description: "Payment channel. card_present: terminal/POS payment. card_not_present:\
