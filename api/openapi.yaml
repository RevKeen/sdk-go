          - contactless
          - magnetic_stripe
          - manual_entry
          - fallback
          - null
          nullable: true
          type: string
        metadata:
          additionalProperties: true
          description: Custom key-value metadata
          type: object
        created_at:
          format: date-time
          type: string
        updated_at:
          format: date-time
          type: string
        authorized_at:
          format: date-time
          nullable: true
          type: string
        captured_at:
          format: date-time
          nullable: true
          type: string
        voided_at:
          format: date-time
          nullable: true
          type: string
        refunded_at:
          format: date-time
          nullable: true
          type: string
