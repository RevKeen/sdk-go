components:
  parameters: {}
  schemas:
    WebhookEvent:
      description: "The envelope for all webhook event deliveries. Contains the event\
        \ type, timestamp, and the affected object in the data field."
      properties:
        id:
          description: Unique event identifier
          example: evt_1a2b3c4d5e6f
          type: string
        type:
          description: "Event type using dot notation (e.g., `payment.succeeded`)"
          example: payment.succeeded
          type: string
        created:
          description: Unix timestamp when the event was created
          example: 1705689600
          type: integer
        livemode:
          description: Whether this event occurred in live mode
          example: true
          type: boolean
        data:
          $ref: "#/components/schemas/WebhookEvent_data"
      required:
      - created
      - data
      - id
      - type
    SubscriptionTerms:
      description: Subscription billing terms for recurring invoices
      properties:
        collection_method:
          description: How to collect payment for recurring invoices
          enum:
          - charge_automatically
          - send_invoice
          example: charge_automatically
          type: string
        start_mode:
          description: When the subscription billing cycle starts
          enum:
          - when_paid
          - on_invoice_date
          - first_of_next_month
          - specific_date
          example: when_paid
          type: string
        start_date:
          description: Start date (ISO 8601) — required when start_mode is 'specific_date'
          type: string
        duration_type:
          description: How the subscription duration is determined
          enum:
          - until_cancelled
          - fixed_cycles
          - end_date
          example: until_cancelled
          type: string
        duration_count:
          description: Number of billing cycles — required when duration_type is 'fixed_cycles'
          example: 12
          minimum: 1
          type: integer
        end_date:
          description: End date (ISO 8601) — required when duration_type is 'end_date'
