    SubscriptionSchedule:
      description: "A subscription schedule defines future changes to a subscription.\
        \ Each phase specifies different pricing, quantities, or plans that take effect\
        \ at specified dates."
      properties:
        id:
          description: Public schedule ID (sub_sched_xxx)
          type: string
        object:
          description: Object type
          enum:
          - subscription_schedule
          type: string
        status:
          description: "Schedule status. not_started: Scheduled for future. active:\
            \ Currently executing phases. completed: All phases finished. canceled:\
            \ Manually canceled. released: Detached from subscription."
          enum:
          - not_started
          - active
          - completed
          - canceled
          - released
          type: string
        customer:
          description: Customer ID
          format: uuid
          nullable: true
          type: string
        subscription:
          description: Linked subscription ID
          format: uuid
          nullable: true
          type: string
        current_phase:
          $ref: "#/components/schemas/SubscriptionSchedule_current_phase"
        phases:
          description: All phases in the schedule
          items:
            $ref: "#/components/schemas/SchedulePhase"
          type: array
        end_behavior:
          description: "What happens when the schedule completes. cancel: Cancel the\
            \ subscription. release: Make subscription standalone."
          enum:
          - cancel
          - release
          type: string
        released_at:
          description: When released (Unix timestamp)
          nullable: true
          type: integer
        released_subscription:
          description: Subscription ID at release time
          format: uuid
          nullable: true
          type: string
        metadata:
          additionalProperties: true
          description: Custom metadata
          type: object
        created:
          description: Unix timestamp of creation
          type: integer
        livemode:
          description: Whether in live mode
          type: boolean
      required:
      - created
      - current_phase
      - customer
      - end_behavior
      - id
      - livemode
      - object
      - phases
      - status
      - subscription
    SchedulePhase:
      description: "A time-bounded phase within a subscription schedule, with its\
        \ own pricing, quantities, and billing configuration."
