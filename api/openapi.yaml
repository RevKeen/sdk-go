    Payment:
      description: "A completed or in-progress money movement. Payments represent\
        \ funds transferred between a customer and your account across all channels\
        \ — online, terminal, and recurring."
      properties:
        id:
          description: Unique identifier for the payment
          format: uuid
          type: string
        object:
          description: Object type
          enum:
          - payment
          type: string
        invoice_id:
          description: Associated invoice ID
          format: uuid
          nullable: true
