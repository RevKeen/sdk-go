      - description
      - id
      - quantity
      - subtotal
      - total
      - unit_price
    OrderErrorResponse:
      description: Error response returned when an order operation fails.
      properties:
        error:
          $ref: "#/components/schemas/PriceErrorResponse_error"
      required:
      - error
    CreateOrderRequest:
      description: Parameters for creating a new order with line items and customer
