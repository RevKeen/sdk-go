          nullable: true
          type: string
        response_code:
          description: Terminal response code. '00' indicates approval.
          nullable: true
          type: string
        rrn:
          description: Retrieval Reference Number for settlement reconciliation
          nullable: true
          type: string
        card_scheme:
          description: "Card network (e.g., VISA, MASTERCARD, AMEX)"
