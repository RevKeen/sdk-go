      - unit_amount_minor
    CreditNotePreviewResponse:
      example:
        data:
          exceeds_max_creditable: true
          proposed_amount_minor: 0
          credit_method: credit_method
          proposed_tax_amount_minor: 6
          invoice_id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
          currency: currency
          invoice:
            max_creditable_minor: 7
            amount_paid_minor: 5
            total_minor: 1
