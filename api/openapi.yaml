        unit_amount_minor:
          description: Per-unit credit amount in cents
          example: 5000
          type: integer
        total_amount_minor:
          description: Total credit for this line in cents
          example: 5000
          type: integer
        metadata:
          additionalProperties: {}
        created_at:
          format: date-time
          type: string
      required:
