    PaymentAttempt:
      description: "A record of an individual payment processing attempt, including\
        \ gateway response codes, AVS/CVV results, and retry metadata."
      properties:
        id:
          description: Unique identifier for the payment attempt
          format: uuid
          type: string
        public_id:
          description: External reference ID (payatt_xxx format). Used as order_id
            in gateway requests.
          example: payatt_abc123xyz789
          nullable: true
          type: string
        gateway_order_id:
          description: "Order ID sent to the processor. Format: payatt_<public_id>.\
            \ Primary correlation key for webhook mapping."
          example: payatt_abc123xyz789
          nullable: true
          type: string
        gateway_transaction_id:
          description: Processor-assigned transaction reference.
          example: "12345678901"
          nullable: true
          type: string
        payment_id:
          description: Logical payment (PaymentIntent) this attempt belongs to
          format: uuid
          nullable: true
          type: string
        invoice_id:
          description: Associated invoice ID
          format: uuid
          nullable: true
          type: string
        subscription_id:
          description: Associated subscription ID
          format: uuid
          nullable: true
          type: string
        checkout_session_id:
          description: Associated checkout session ID
          format: uuid
          nullable: true
          type: string
        billing_run_id:
          description: Billing run ID for batch reconciliation
          format: uuid
          nullable: true
          type: string
        gateway:
          description: Name of the payment processor that handled this attempt
          type: string
        gateway_code:
          description: Processor-returned response code
          type: string
        gateway_message:
          description: Processor-returned response message
          type: string
        category:
          description: Normalized error category for the payment attempt
          enum:
          - approved
          - generic_decline
          - insufficient_funds
          - over_limit
          - expired_card
          - invalid_card_number
          - invalid_cvv
          - invalid_expiry
          - invalid_pin
          - transaction_not_allowed
          - call_issuer
          - incorrect_payment_info
          - lost_or_stolen
          - pickup_card
          - suspected_fraud
          - restricted_card
          - stop_all_recurring
          - stop_this_program
          - update_cardholder_data
          - processor_error
          - gateway_error
          - communication_error
          - merchant_config_error
          - merchant_inactive
          - issuer_unavailable
          - duplicate_transaction
          - invalid_transaction
          - unsupported_card
          - feature_not_available
          - authentication_required
          type: string
        severity:
          description: Severity level for logging/monitoring
          enum:
          - info
          - warn
          - error
          type: string
        retryability:
          description: "Retry behavior recommendation. retry_now: Safe to retry immediately.\
            \ retry_later: Retry after delay. do_not_retry: Hard decline, don't retry."
          enum:
          - retry_now
          - retry_later
          - do_not_retry
          type: string
        customer_action:
          description: Recommended action for the customer
          enum:
          - try_again
          - use_other_method
          - update_card
          - contact_bank
          - contact_merchant
          - none
          type: string
        merchant_action:
          description: Recommended action for the merchant
          enum:
          - none
          - collect_new_pm
          - fix_config
          - contact_support
          - fraud_review
          - schedule_retry
          - contact_bank
          - stop_recurring
          type: string
        subscription_directive:
          description: Directive for subscription handling after decline
          enum:
          - none
          - stop_all
          - stop_program
          - update_cardholder_data
          type: string
        safe_customer_message_key:
          description: Template key for customer-facing message
          type: string
        decline_type:
          description: "Decline classification. soft: May succeed on retry. hard:\
            \ Will not succeed on retry."
          enum:
          - soft
          - hard
          - null
          nullable: true
          type: string
        attempt_status:
          description: Final outcome status of the attempt
          enum:
          - pending
          - succeeded
          - failed
          - canceled
          type: string
        amount_cents:
          description: Payment amount in cents
          nullable: true
          type: integer
        currency:
          description: Three-letter ISO currency code
          nullable: true
          type: string
        payment_method_last4:
          description: Last 4 digits of card
          nullable: true
          type: string
        payment_method_brand:
          description: "Card brand (visa, mastercard, etc.)"
          nullable: true
          type: string
        attempt_number:
          description: Attempt sequence number (1 = first attempt)
          type: integer
        retry_attempt_number:
          description: Legacy retry attempt number
          type: integer
        max_retry_attempts:
          description: Maximum retry attempts allowed
          nullable: true
          type: integer
        next_retry_at:
          description: Next scheduled retry timestamp
          format: date-time
          nullable: true
          type: string
        is_scheduled_retry:
          description: Whether this was a scheduled retry
          type: boolean
        is_manual_retry:
          description: Whether this was a manual retry
          type: boolean
        created_at:
          description: When the attempt was created
          format: date-time
          type: string
        updated_at:
          description: When the attempt was last updated
          format: date-time
          type: string
      required:
      - amount_cents
      - attempt_number
      - attempt_status
      - billing_run_id
      - category
      - checkout_session_id
      - created_at
      - currency
      - customer_action
      - decline_type
      - gateway
      - gateway_code
      - gateway_message
      - gateway_order_id
      - gateway_transaction_id
      - id
      - invoice_id
      - is_manual_retry
      - is_scheduled_retry
      - max_retry_attempts
      - merchant_action
      - next_retry_at
      - payment_id
      - payment_method_brand
      - payment_method_last4
      - public_id
      - retry_attempt_number
      - retryability
      - safe_customer_message_key
      - severity
      - subscription_directive
      - subscription_id
      - updated_at
