          type: integer
        unit_price:
          description: Unit price in cents
          type: integer
        subtotal:
          description: Subtotal in cents (unit_price * quantity)
          type: integer
        discount:
          default: 0
          description: Discount in cents
          type: integer
        tax:
          default: 0
          description: Tax in cents
          type: integer
        total:
          description: Total in cents (subtotal - discount + tax)
          type: integer
        metadata:
          additionalProperties: true
          description: Custom key-value metadata
          type: object
        position:
          default: 0
          type: integer
